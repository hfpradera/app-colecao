services:
  colecao-app:
    build: .
    container_name: colecao-app
    ports:
      - "3010:3010"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - OPENAI_INPUT_USD_PER_1M=${OPENAI_INPUT_USD_PER_1M:-0.40}
      - OPENAI_OUTPUT_USD_PER_1M=${OPENAI_OUTPUT_USD_PER_1M:-1.60}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
